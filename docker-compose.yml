version: '3.8'

services:
  sentinel-server:
    build:
      context: ./packages/sentinel-server
      dockerfile: Dockerfile
    container_name: sentinel-server
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      MASTER_SECRET: ${MASTER_SECRET:?Set MASTER_SECRET in .env}
      DATA_DIR: /data/sentinel
      # APNs (optional)
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_TOPIC: ${APNS_TOPIC:-com.sentinel.ios}
      APNS_PRODUCTION: ${APNS_PRODUCTION:-false}
    volumes:
      - sentinel-data:/data/sentinel
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  sentinel-data:
    driver: local
