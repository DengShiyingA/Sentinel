name: sentinel_app
description: Sentinel — Claude Code approval engine for mobile
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.0

  # Networking
  socket_io_client: ^3.1.4
  web_socket_channel: ^3.0.0

  # LAN discovery
  nsd: ^5.0.1

  # Encryption
  # sodium_libs: ^2.2.1  # Enable when libsodium needed

  # Auth / Biometrics
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # UI
  google_fonts: ^8.0.2
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.2
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
